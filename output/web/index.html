<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360° Panorama Virtual Tour Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

  #app { width: 100vw; height: 100vh; position: relative; }

  /* 메인 파노라마 뷰어 */
  #panorama-canvas { width: 100%; height: 100%; display: block; }

  /* 상단 헤더 */
  #header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 20px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    display: flex; align-items: center; gap: 16px;
    z-index: 100;
  }
  #header h1 { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: 0.5px; }
  #header .badge {
    background: rgba(99,179,237,0.2); border: 1px solid rgba(99,179,237,0.5);
    color: #63b3ed; padding: 2px 8px; border-radius: 12px; font-size: 11px;
  }
  #kf-info {
    margin-left: auto; font-size: 12px; color: #a0aec0;
  }

  /* 좌측 미니맵 패널 */
  #minimap-panel {
    position: absolute; left: 16px; top: 60px; bottom: 80px;
    width: 220px;
    background: rgba(10,10,20,0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;
    z-index: 100;
    display: flex; flex-direction: column;
  }
  #minimap-header {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 11px; font-weight: 600; color: #90cdf4; text-transform: uppercase;
    letter-spacing: 1px;
  }
  #minimap-canvas-container {
    flex: 1; position: relative; overflow: hidden;
  }
  #minimap-canvas { width: 100%; height: 100%; display: block; }

  /* 우측 키프레임 목록 */
  #keyframe-panel {
    position: absolute; right: 16px; top: 60px; bottom: 80px;
    width: 200px;
    background: rgba(10,10,20,0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;
    z-index: 100;
    display: flex; flex-direction: column;
  }
  #keyframe-header {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 11px; font-weight: 600; color: #90cdf4; text-transform: uppercase;
    letter-spacing: 1px;
  }
  #keyframe-list {
    flex: 1; overflow-y: auto; padding: 6px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
  }
  .kf-item {
    padding: 7px 10px; border-radius: 7px; cursor: pointer;
    margin-bottom: 3px; transition: all 0.15s;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
  }
  .kf-item:hover { background: rgba(99,179,237,0.15); }
  .kf-item.active { background: rgba(99,179,237,0.25); border: 1px solid rgba(99,179,237,0.4); }
  .kf-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #63b3ed; flex-shrink: 0;
  }
  .kf-item.active .kf-dot { background: #fff; box-shadow: 0 0 6px #63b3ed; }
  .kf-id { color: #90cdf4; font-weight: 600; min-width: 30px; }
  .kf-pos { color: #718096; font-size: 10px; }

  /* 하단 컨트롤 바 */
  #controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    display: flex; align-items: center; gap: 12px;
    z-index: 100;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer;
    font-size: 13px; transition: all 0.15s; white-space: nowrap;
  }
  .ctrl-btn:hover { background: rgba(99,179,237,0.3); border-color: #63b3ed; }
  .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #progress-bar {
    flex: 1; height: 4px; background: rgba(255,255,255,0.1);
    border-radius: 2px; cursor: pointer; position: relative;
  }
  #progress-fill {
    height: 100%; background: linear-gradient(to right, #63b3ed, #9f7aea);
    border-radius: 2px; transition: width 0.3s;
  }
  #progress-thumb {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 8px rgba(99,179,237,0.8);
    pointer-events: none;
  }

  /* 3D 맵 뷰 토글 */
  #map3d-panel {
    position: absolute; left: 250px; top: 60px;
    width: 300px; height: 220px;
    background: rgba(10,10,20,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; overflow: hidden;
    z-index: 100; display: none;
  }
  #map3d-panel.visible { display: block; }
  #map3d-header {
    padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 11px; font-weight: 600; color: #90cdf4; text-transform: uppercase;
    letter-spacing: 1px; display: flex; justify-content: space-between;
  }
  #map3d-canvas { width: 100%; height: calc(100% - 32px); display: block; }

  /* 로딩 오버레이 */
  #loading {
    position: absolute; inset: 0; background: rgba(0,0,0,0.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200;
  }
  #loading h2 { font-size: 20px; margin-bottom: 12px; color: #90cdf4; }
  #loading p { color: #718096; font-size: 14px; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(99,179,237,0.2);
    border-top-color: #63b3ed; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 핫스팟 (다음 위치로 이동) */
  .hotspot {
    position: absolute; width: 36px; height: 36px;
    border-radius: 50%; cursor: pointer;
    background: rgba(99,179,237,0.3);
    border: 2px solid rgba(99,179,237,0.8);
    transform: translate(-50%, -50%);
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    pointer-events: all;
  }
  .hotspot:hover {
    background: rgba(99,179,237,0.6);
    transform: translate(-50%, -50%) scale(1.2);
  }
  .hotspot::after {
    content: '▶'; color: #fff; font-size: 12px;
  }
  #hotspot-container {
    position: absolute; inset: 0; pointer-events: none; z-index: 50;
  }

  /* 뷰 모드 토글 */
  #view-toggle {
    position: absolute; top: 60px; right: 230px;
    display: flex; gap: 6px; z-index: 100;
  }
  .view-btn {
    background: rgba(10,10,20,0.85); border: 1px solid rgba(255,255,255,0.15);
    color: #a0aec0; padding: 6px 12px; border-radius: 8px; cursor: pointer;
    font-size: 12px; transition: all 0.15s;
  }
  .view-btn.active { background: rgba(99,179,237,0.2); border-color: #63b3ed; color: #fff; }
</style>
</head>
<body>
<div id="app">
  <!-- 로딩 -->
  <div id="loading">
    <div class="spinner"></div>
    <h2>360° Tour Loading...</h2>
    <p id="loading-msg">Initializing Three.js renderer...</p>
  </div>

  <!-- 메인 파노라마 캔버스 -->
  <canvas id="panorama-canvas"></canvas>

  <!-- 핫스팟 컨테이너 -->
  <div id="hotspot-container"></div>

  <!-- 헤더 -->
  <div id="header">
    <h1>360° Virtual Tour</h1>
    <span class="badge">stella_vSLAM</span>
    <span class="badge">Insta360 X3</span>
    <div id="kf-info">KF <span id="current-kf">0</span> / <span id="total-kf">103</span></div>
  </div>

  <!-- 뷰 모드 토글 -->
  <div id="view-toggle">
    <button class="view-btn active" onclick="setViewMode('panorama')" id="btn-panorama">🌐 파노라마</button>
    <button class="view-btn" onclick="setViewMode('map3d')" id="btn-map3d">🗺️ 3D 맵</button>
  </div>

  <!-- 미니맵 (2D 탑뷰) -->
  <div id="minimap-panel">
    <div id="minimap-header">📍 카메라 경로 (탑뷰)</div>
    <div id="minimap-canvas-container">
      <canvas id="minimap-canvas"></canvas>
    </div>
  </div>

  <!-- 3D 맵 패널 -->
  <div id="map3d-panel">
    <div id="map3d-header">
      <span>3D 포인트 클라우드 + 경로</span>
      <span style="cursor:pointer;color:#718096" onclick="toggleMap3D()">✕</span>
    </div>
    <canvas id="map3d-canvas"></canvas>
  </div>

  <!-- 키프레임 목록 -->
  <div id="keyframe-panel">
    <div id="keyframe-header">🎯 키프레임 목록</div>
    <div id="keyframe-list"></div>
  </div>

  <!-- 하단 컨트롤 -->
  <div id="controls">
    <button class="ctrl-btn" id="btn-prev" onclick="navigateTo(currentKF - 1)">◀ 이전</button>
    <div id="progress-bar" onclick="onProgressClick(event)">
      <div id="progress-fill" style="width:0%"></div>
      <div id="progress-thumb" style="left:0%"></div>
    </div>
    <button class="ctrl-btn" id="btn-next" onclick="navigateTo(currentKF + 1)">다음 ▶</button>
    <button class="ctrl-btn" id="btn-auto" onclick="toggleAutoPlay()">▶ 자동재생</button>
    <button class="ctrl-btn" onclick="togglePointCloud()">☁ 포인트 클라우드</button>
    <button class="ctrl-btn" id="btn-toggle-mesh" onclick="toggleMesh()" style="display:none">🏗 메시 숨기기</button>
    <button class="ctrl-btn" onclick="toggleMap3D()">🗺 3D 맵</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/PLYLoader.js"></script>
<script>
// ============================================================
// 전역 상태
// ============================================================
let scene, camera, renderer;
let panoramaMesh, pointCloudMesh;
let mapScene, mapCamera, mapRenderer;
let minimapCtx;
let cameraPathData = null;
let pointCloudData = null;
let currentKF = 0;
let totalKF = 0;
let autoPlayTimer = null;
let isAutoPlaying = false;
let showPointCloud = true;
let viewMode = 'panorama';
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let sphericalAngles = { phi: Math.PI / 2, theta: 0 };
let textureCache = {};
let currentTexture = null;

// ============================================================
// 초기화
// ============================================================
async function init() {
  setLoadingMsg('Three.js 렌더러 초기화...');
  
  // 메인 렌더러 (파노라마)
  const canvas = document.getElementById('panorama-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 0);
  
  // 파노라마 구체 (내부에서 보는 방식)
  const geometry = new THREE.SphereGeometry(500, 60, 40);
  geometry.scale(-1, 1, 1); // 내부 렌더링
  const material = new THREE.MeshBasicMaterial({ color: 0x111122 });
  panoramaMesh = new THREE.Mesh(geometry, material);
  scene.add(panoramaMesh);
  
  // 데이터 로드
  setLoadingMsg('카메라 경로 데이터 로드...');
  await loadCameraPath();
  
  setLoadingMsg('포인트 클라우드 로드...');
  await loadPointCloud();
  
  // 미니맵 초기화
  initMinimap();
  
  // 3D 맵 초기화
  initMap3D();
  
  // 키프레임 목록 생성
  buildKeyframeList();
  
  // 첫 번째 키프레임으로 이동
  await navigateTo(0);
  
  // 이벤트 리스너
  setupEventListeners();
  
  // 로딩 완료
  document.getElementById('loading').style.display = 'none';
  
  // 렌더 루프 시작
  animate();
}

// ============================================================
// 데이터 로드
// ============================================================
async function loadCameraPath() {
  try {
    const resp = await fetch('../camera_path.json');
    cameraPathData = await resp.json();
    totalKF = cameraPathData.total_keyframes - 1;
    document.getElementById('total-kf').textContent = totalKF;
    console.log(`[INFO] Loaded ${cameraPathData.total_keyframes} keyframes`);
  } catch(e) {
    console.error('[ERROR] Failed to load camera_path.json:', e);
    // 데모 데이터 생성
    cameraPathData = generateDemoPath();
  }
}

async function loadPointCloud() {
  try {
    const resp = await fetch('../pointcloud_web.json');
    pointCloudData = await resp.json();
    console.log(`[INFO] Loaded ${pointCloudData.points.length} point cloud points`);
    createPointCloudMesh();
  } catch(e) {
    console.error('[ERROR] Failed to load pointcloud_web.json:', e);
  }
}

function generateDemoPath() {
  // 데모 경로 (U자형)
  const kfs = [];
  for (let i = 0; i < 104; i++) {
    const t = i / 103;
    let x, z;
    if (t < 0.33) {
      x = 0; z = t * 3;
    } else if (t < 0.67) {
      const a = (t - 0.33) / 0.34 * Math.PI;
      x = Math.sin(a) * 1.5; z = 1.0 + Math.cos(a) * 0.3;
    } else {
      x = 1.5; z = 1.0 - (t - 0.67) * 3;
    }
    kfs.push({
      id: i, timestamp: i * 0.033,
      position: { x, y: 0, z },
      forward: { x: 0, y: 0, z: 1 },
      image_file: `frame_${String(i).padStart(4,'0')}.jpg`,
      n_keypts: 18000
    });
  }
  return { total_keyframes: 104, keyframes: kfs };
}

// ============================================================
// 포인트 클라우드 메시 생성
// ============================================================
function createPointCloudMesh() {
  if (!pointCloudData || !cameraPathData) return;
  
  const kf0 = cameraPathData.keyframes[0];
  const origin = new THREE.Vector3(
    kf0.position.x, kf0.position.y, kf0.position.z
  );
  
  const pts = pointCloudData.points;
  const colors = pointCloudData.colors;
  
  const positions = new Float32Array(pts.length * 3);
  const colorArr = new Float32Array(pts.length * 3);
  
  for (let i = 0; i < pts.length; i++) {
    // SLAM 좌표계 → Three.js 좌표계 변환 (Y-up)
    // SLAM: X-right, Y-down, Z-forward
    // Three.js: X-right, Y-up, Z-backward
    positions[i*3]   = (pts[i][0] - origin.x) * 100;  // X
    positions[i*3+1] = -(pts[i][1] - origin.y) * 100; // Y (반전)
    positions[i*3+2] = -(pts[i][2] - origin.z) * 100; // Z (반전)
    
    colorArr[i*3]   = colors[i][0];
    colorArr[i*3+1] = colors[i][1];
    colorArr[i*3+2] = colors[i][2];
  }
  
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colorArr, 3));
  
  const material = new THREE.PointsMaterial({
    size: 2, vertexColors: true, sizeAttenuation: false, opacity: 0.6, transparent: true
  });
  
  if (pointCloudMesh) scene.remove(pointCloudMesh);
  pointCloudMesh = new THREE.Points(geometry, material);
  // 파노라마 뷰에서는 포인트 클라우드 숨김 (3D 맵에서만 표시)
  pointCloudMesh.visible = false;
  scene.add(pointCloudMesh);
}

// ============================================================
// 파노라마 네비게이션
// ============================================================
async function navigateTo(kfIndex) {
  if (!cameraPathData) return;
  
  const kfs = cameraPathData.keyframes;
  kfIndex = Math.max(0, Math.min(kfIndex, kfs.length - 1));
  currentKF = kfIndex;
  
  const kf = kfs[kfIndex];
  
  // UI 업데이트
  document.getElementById('current-kf').textContent = kf.id;
  updateProgress(kfIndex, kfs.length - 1);
  updateKeyframeList(kfIndex);
  updateMinimap(kfIndex);
  updateMap3D(kfIndex);
  updateHotspots(kfIndex);
  updateNavButtons(kfIndex, kfs.length - 1);
  
  // 파노라마 텍스처 로드
  await loadPanoramaTexture(kf);
}

async function loadPanoramaTexture(kf) {
  const imgPath = `../images/${kf.image_file}`;
  
  if (textureCache[kf.id]) {
    applyTexture(textureCache[kf.id]);
    return;
  }
  
  return new Promise((resolve) => {
    const loader = new THREE.TextureLoader();
    loader.load(
      imgPath,
      (texture) => {
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        textureCache[kf.id] = texture;
        applyTexture(texture);
        resolve();
      },
      undefined,
      (err) => {
        // 이미지 로드 실패 시 색상으로 대체
        const color = new THREE.Color().setHSL(kf.id / 104, 0.5, 0.3);
        panoramaMesh.material = new THREE.MeshBasicMaterial({ color });
        resolve();
      }
    );
  });
}

function applyTexture(texture) {
  if (currentTexture && currentTexture !== texture) {
    // 텍스처 전환 애니메이션 (간단한 페이드)
  }
  currentTexture = texture;
  panoramaMesh.material = new THREE.MeshBasicMaterial({
    map: texture, side: THREE.BackSide
  });
}

// ============================================================
// 미니맵 (2D 탑뷰)
// ============================================================
function initMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  const container = document.getElementById('minimap-canvas-container');
  canvas.width = container.offsetWidth || 220;
  canvas.height = container.offsetHeight || 300;
  minimapCtx = canvas.getContext('2d');
  
  // 클릭으로 키프레임 선택
  canvas.addEventListener('click', onMinimapClick);
  
  drawMinimap(0);
}

function worldToMinimap(x, z, canvasW, canvasH, padding=20) {
  if (!cameraPathData) return { px: 0, py: 0 };
  
  const kfs = cameraPathData.keyframes;
  const xs = kfs.map(k => k.position.x);
  const zs = kfs.map(k => k.position.z);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const zMin = Math.min(...zs), zMax = Math.max(...zs);
  
  const rangeX = xMax - xMin || 1;
  const rangeZ = zMax - zMin || 1;
  const scale = Math.min((canvasW - padding*2) / rangeX, (canvasH - padding*2) / rangeZ);
  
  const px = padding + (x - xMin) * scale;
  const py = canvasH - padding - (z - zMin) * scale;
  return { px, py };
}

function drawMinimap(activeIdx) {
  if (!minimapCtx || !cameraPathData) return;
  
  const canvas = document.getElementById('minimap-canvas');
  const W = canvas.width, H = canvas.height;
  const ctx = minimapCtx;
  
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(10,10,30,0.8)';
  ctx.fillRect(0, 0, W, H);
  
  const kfs = cameraPathData.keyframes;
  
  // 경로 선
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(99,179,237,0.4)';
  ctx.lineWidth = 1.5;
  kfs.forEach((kf, i) => {
    const { px, py } = worldToMinimap(kf.position.x, kf.position.z, W, H);
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  });
  ctx.stroke();
  
  // 키프레임 점
  kfs.forEach((kf, i) => {
    const { px, py } = worldToMinimap(kf.position.x, kf.position.z, W, H);
    const isActive = i === activeIdx;
    
    ctx.beginPath();
    ctx.arc(px, py, isActive ? 5 : 3, 0, Math.PI * 2);
    ctx.fillStyle = isActive ? '#fff' : 'rgba(99,179,237,0.7)';
    ctx.fill();
    
    if (isActive) {
      ctx.beginPath();
      ctx.arc(px, py, 9, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(99,179,237,0.8)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      
      // 전방 방향 화살표
      const fwd = kf.forward;
      const len = 18;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + fwd.x * len, py - fwd.z * len);
      ctx.strokeStyle = '#f6ad55';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  });
  
  // 시작/끝 레이블
  const start = worldToMinimap(kfs[0].position.x, kfs[0].position.z, W, H);
  const end = worldToMinimap(kfs[kfs.length-1].position.x, kfs[kfs.length-1].position.z, W, H);
  ctx.font = '9px sans-serif';
  ctx.fillStyle = '#68d391';
  ctx.fillText('START', start.px + 6, start.py - 4);
  ctx.fillStyle = '#fc8181';
  ctx.fillText('END', end.px + 6, end.py - 4);
}

function onMinimapClick(e) {
  if (!cameraPathData) return;
  const canvas = document.getElementById('minimap-canvas');
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  const kfs = cameraPathData.keyframes;
  let closest = 0, minDist = Infinity;
  
  kfs.forEach((kf, i) => {
    const { px, py } = worldToMinimap(kf.position.x, kf.position.z, canvas.width, canvas.height);
    const d = Math.hypot(mx - px, my - py);
    if (d < minDist) { minDist = d; closest = i; }
  });
  
  if (minDist < 20) navigateTo(closest);
}

function updateMinimap(activeIdx) {
  drawMinimap(activeIdx);
}

let map3dScene, map3dCamera, map3dRenderer, map3dControls;
let map3dPathLine, map3dCurrentMarker;
let map3dAnimating = false;

function initMap3D() {
  const canvas = document.getElementById('map3d-canvas');
  map3dRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  map3dRenderer.setSize(300, 188);
  map3dRenderer.setClearColor(0x050510, 1);
  
  map3dScene = new THREE.Scene();
  map3dCamera = new THREE.PerspectiveCamera(60, 300/188, 0.01, 1000);
  map3dCamera.position.set(0, 3, 3);
  map3dCamera.lookAt(0, 0, 0);
  
  // 조명
  map3dScene.add(new THREE.AmbientLight(0x404060, 2));
  const dirLight = new THREE.DirectionalLight(0x8080ff, 1);
  dirLight.position.set(1, 2, 1);
  map3dScene.add(dirLight);
  
  if (!cameraPathData) return;
  
  const kfs = cameraPathData.keyframes;
  const origin = kfs[0].position;
  const scale = 2; // 시각화 스케일
  
  // 경로 라인
  const pathPoints = kfs.map(kf => new THREE.Vector3(
    (kf.position.x - origin.x) * scale,
    -(kf.position.y - origin.y) * scale,
    -(kf.position.z - origin.z) * scale
  ));
  
  const pathGeo = new THREE.BufferGeometry().setFromPoints(pathPoints);
  const pathMat = new THREE.LineBasicMaterial({ color: 0x63b3ed, linewidth: 2 });
  map3dPathLine = new THREE.Line(pathGeo, pathMat);
  map3dScene.add(map3dPathLine);
  
  // 키프레임 점들
  const kfGeo = new THREE.BufferGeometry();
  const kfPositions = new Float32Array(kfs.length * 3);
  kfs.forEach((kf, i) => {
    kfPositions[i*3]   = (kf.position.x - origin.x) * scale;
    kfPositions[i*3+1] = -(kf.position.y - origin.y) * scale;
    kfPositions[i*3+2] = -(kf.position.z - origin.z) * scale;
  });
  kfGeo.setAttribute('position', new THREE.BufferAttribute(kfPositions, 3));
  const kfMat = new THREE.PointsMaterial({ color: 0x4299e1, size: 0.05 });
  map3dScene.add(new THREE.Points(kfGeo, kfMat));
  
  // 현재 위치 마커
  const markerGeo = new THREE.SphereGeometry(0.06, 8, 8);
  const markerMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  map3dCurrentMarker = new THREE.Mesh(markerGeo, markerMat);
  map3dScene.add(map3dCurrentMarker);
  
  // 포인트 클라우드 (3D 맵용, 다운샘플)
  if (pointCloudData) {
    const pts = pointCloudData.points;
    const step = Math.max(1, Math.floor(pts.length / 5000)); // 최대 5000포인트
    const pcPositions = [];
    const pcColors = [];
    
    for (let i = 0; i < pts.length; i += step) {
      pcPositions.push(
        (pts[i][0] - origin.x) * scale,
        -(pts[i][1] - origin.y) * scale,
        -(pts[i][2] - origin.z) * scale
      );
      const c = pointCloudData.colors[i];
      pcColors.push(c[0], c[1], c[2]);
    }
    
    const pcGeo = new THREE.BufferGeometry();
    pcGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pcPositions), 3));
    pcGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(pcColors), 3));
    const pcMat = new THREE.PointsMaterial({ size: 0.03, vertexColors: true, opacity: 0.5, transparent: true });
    map3dScene.add(new THREE.Points(pcGeo, pcMat));
  }
  
  // 마우스 회전 컨트롤
  setupMap3DControls();

  // OpenMVS 메시 로드 시도 (파일이 있을 때만)
  loadMeshIntoMap3D();
  
  renderMap3D();
}

// ============================================================
// OpenMVS OBJ 메시 3D 맵에 로드
// ============================================================
let meshObject = null;

function loadMeshIntoMap3D() {
  // 메시 파일 경로 후보 (우선순위: COLMAP PLY > OpenMVS OBJ)
  const candidates = [
    { path: '../mesh/scene_mesh.ply',          type: 'ply' },
    { path: '../mesh/dense_pointcloud.ply',     type: 'ply' },
    { path: '../colmap_dense/dense/meshed-poisson.ply', type: 'ply' },
    { path: '../colmap_dense/dense/fused.ply',  type: 'ply' },
    { path: '../openmvs/scene_dense_mesh_texture.obj', type: 'obj' },
    { path: '../openmvs/scene_dense_mesh.obj',  type: 'obj' },
    { path: '../openmvs/scene_mesh.obj',        type: 'obj' },
  ];

  const kfs = cameraPathData ? cameraPathData.keyframes : [];
  const origin = kfs.length ? kfs[0].position : { x: 0, y: 0, z: 0 };
  const scale = 2;

  function tryLoad(idx) {
    if (idx >= candidates.length) {
      console.log('[INFO] 메시 파일 없음 - COLMAP 또는 OpenMVS 실행 후 자동 로드됩니다');
      return;
    }
    const { path, type } = candidates[idx];
    fetch(path, { method: 'HEAD' }).then(r => {
      if (!r.ok) { tryLoad(idx + 1); return; }
      console.log('[INFO] 메시 로드:', path, '(' + type + ')');

      if (type === 'ply') {
        // PLY 로더 - THREE.PLYLoader 또는 직접 파싱
        const loadPLY = (plyPath) => {
          if (typeof THREE.PLYLoader !== 'undefined') {
            const loader = new THREE.PLYLoader();
            loader.load(plyPath,
              (geometry) => {
                geometry.computeVertexNormals();
                const mat = new THREE.MeshPhongMaterial({
                  color: 0x88aacc,
                  opacity: 0.75,
                  transparent: true,
                  side: THREE.DoubleSide,
                  vertexColors: geometry.hasAttribute('color')
                });
                const mesh = new THREE.Mesh(geometry, mat);
                addMeshToMap3D(mesh, origin, scale);
              },
              (xhr) => { if (xhr.total) console.log('[INFO] PLY 로드:', Math.round(xhr.loaded/xhr.total*100) + '%'); },
              (err) => { console.warn('[WARN] PLY 로드 실패:', err); tryLoad(idx + 1); }
            );
          } else {
            // PLYLoader 없으면 fetch로 직접 파싱
            console.log('[INFO] PLYLoader 없음, fetch로 직접 파싱:', plyPath);
            fetch(plyPath)
              .then(r => r.arrayBuffer())
              .then(buf => {
                const geometry = parsePLY(buf);
                if (!geometry) { tryLoad(idx + 1); return; }
                geometry.computeVertexNormals();
                const mat = new THREE.MeshPhongMaterial({
                  color: 0x88aacc, opacity: 0.75, transparent: true, side: THREE.DoubleSide,
                  vertexColors: geometry.hasAttribute('color')
                });
                addMeshToMap3D(new THREE.Mesh(geometry, mat), origin, scale);
              })
              .catch(err => { console.warn('[WARN] PLY fetch 실패:', err); tryLoad(idx + 1); });
          }
        };
        loadPLY(path);
      } else {
        // OBJ 로더
        const loader = new THREE.OBJLoader();
        const mtlPath = path.replace('.obj', '.mtl');
        fetch(mtlPath, { method: 'HEAD' }).then(mr => {
          if (mr.ok && typeof THREE.MTLLoader !== 'undefined') {
            const mtlLoader = new THREE.MTLLoader();
            mtlLoader.setPath(path.substring(0, path.lastIndexOf('/') + 1));
            mtlLoader.load(mtlPath.split('/').pop(), (materials) => {
              materials.preload();
              loader.setMaterials(materials);
              loadOBJ(loader, path, origin, scale);
            });
          } else {
            loadOBJ(loader, path, origin, scale);
          }
        }).catch(() => loadOBJ(loader, path, origin, scale));
      }
    }).catch(() => tryLoad(idx + 1));
  }

  tryLoad(0);
}

// PLY/OBJ 공통: 메시를 3D 맵에 추가
function addMeshToMap3D(meshOrObj, origin, scale) {
  if (meshObject) map3dScene.remove(meshObject);
  meshObject = meshOrObj;

  // OBJ는 Group이므로 traverse로 재질 처리
  if (meshOrObj.isGroup) {
    meshOrObj.traverse(child => {
      if (child.isMesh && !child.material.map) {
        child.material = new THREE.MeshPhongMaterial({
          color: 0x88aacc, opacity: 0.7, transparent: true, side: THREE.DoubleSide
        });
      }
    });
  }

  // PLY 메쉬는 SLAM 좌표계와 동일 → 포인트클라우드와 같은 변환 적용
  // 포인트클라우드 변환: (x - origin.x)*scale, -(y - origin.y)*scale, -(z - origin.z)*scale
  // 메쉬도 동일하게 변환
  const box = new THREE.Box3().setFromObject(meshOrObj);
  const meshCenter = box.getCenter(new THREE.Vector3());
  const meshSize = box.getSize(new THREE.Vector3());
  
  // 포인트클라우드 bounds 계산 (씬에서)
  const pts = map3dScene.children.filter(c => c.type === 'Points' && c.geometry && c.geometry.attributes.position.count > 100);
  if (pts.length > 0) {
    // 포인트클라우드와 메쉬의 실제 좌표 범위 비교
    const ptBox = new THREE.Box3();
    pts.forEach(p => ptBox.expandByObject(p));
    const ptSize = ptBox.getSize(new THREE.Vector3());
    const ptCenter = ptBox.getCenter(new THREE.Vector3());
    
    // 스케일: 포인트클라우드 크기 / 메쉬 크기
    const scaleX = ptSize.x / meshSize.x;
    const scaleZ = ptSize.z / meshSize.z;
    const autoScale = (scaleX + scaleZ) / 2;
    
    meshOrObj.scale.setScalar(autoScale);
    // 메쉬 중심을 포인트클라우드 중심으로 이동
    meshOrObj.position.set(
      ptCenter.x - meshCenter.x * autoScale,
      ptCenter.y - meshCenter.y * autoScale,
      ptCenter.z - meshCenter.z * autoScale
    );
    console.log('[OK] 3D 메시 자동 정렬: scale=' + autoScale.toFixed(3));
  } else {
    // 포인트클라우드 없으면 기존 방식
    meshOrObj.position.sub(meshCenter);
    const maxDim = Math.max(meshSize.x, meshSize.y, meshSize.z);
    if (maxDim > 0) meshOrObj.scale.setScalar(scale * 2 / maxDim);
  }

  map3dScene.add(meshOrObj);
  renderMap3D();
  console.log('[OK] 3D 메시 로드 완료');

  // 메시 토글 버튼 활성화
  const btn = document.getElementById('btn-toggle-mesh');
  if (btn) { btn.style.display = 'inline-block'; btn.textContent = '🏗 메시 숨기기'; }
}

function loadOBJ(loader, path, origin, scale) {
  loader.load(path,
    (obj) => addMeshToMap3D(obj, origin, scale),
    (xhr) => { if (xhr.total) console.log('[INFO] OBJ 로드:', Math.round(xhr.loaded/xhr.total*100) + '%'); },
    (err) => console.warn('[WARN] OBJ 로드 실패:', err)
  );
}

let map3dMouseDown = false, map3dDragged = false, map3dLastMouse = { x: 0, y: 0 };
let map3dSpherical = { theta: 0.5, phi: 0.8, radius: 4 };

// 3D 맵 클릭: 가장 가까운 키프레임으로 이동
function onMap3DClick(e) {
  if (map3dDragged) return; // 드래그 후 클릭은 무시
  if (!cameraPathData) return;

  const canvas = document.getElementById('map3d-canvas');
  const rect = canvas.getBoundingClientRect();
  // NDC 좌표 계산
  const ndcX = ((e.clientX - rect.left) / rect.width)  *  2 - 1;
  const ndcY = ((e.clientY - rect.top)  / rect.height) * -2 + 1;

  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera({ x: ndcX, y: ndcY }, map3dCamera);

  const kfs = cameraPathData.keyframes;
  const origin = kfs[0].position;
  const scale = 2;

  // 각 키프레임 3D 위치와 레이의 최근접 거리 계산
  let minDist = Infinity, bestIdx = 0;
  kfs.forEach((kf, i) => {
    const pos = new THREE.Vector3(
      (kf.position.x - origin.x) * scale,
      -(kf.position.y - origin.y) * scale,
      -(kf.position.z - origin.z) * scale
    );
    const dist = raycaster.ray.distanceToPoint(pos);
    if (dist < minDist) { minDist = dist; bestIdx = i; }
  });

  // 클릭 허용 반경: 화면 크기에 비례 (너무 멀면 무시)
  if (minDist < 0.5) {
    navigateTo(bestIdx);
    // 3D 맵 패널 닫고 파노라마로 전환
    setViewMode('panorama');
  }
}

function setupMap3DControls() {
  const canvas = document.getElementById('map3d-canvas');
  canvas.addEventListener('mousedown', e => {
    map3dMouseDown = true;
    map3dDragged = false;
    map3dLastMouse = { x: e.clientX, y: e.clientY };
  });
  canvas.addEventListener('mousemove', e => {
    if (!map3dMouseDown) return;
    const dx = e.clientX - map3dLastMouse.x;
    const dy = e.clientY - map3dLastMouse.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) map3dDragged = true;
    map3dSpherical.theta -= dx * 0.01;
    map3dSpherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, map3dSpherical.phi + dy * 0.01));
    map3dLastMouse = { x: e.clientX, y: e.clientY };
    updateMap3DCamera();
    renderMap3D();
  });
  canvas.addEventListener('mouseup', e => {
    map3dMouseDown = false;
    onMap3DClick(e);
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    map3dSpherical.radius = Math.max(1, Math.min(10, map3dSpherical.radius + e.deltaY * 0.005));
    updateMap3DCamera();
    renderMap3D();
  }, { passive: false });
}

function updateMap3DCamera() {
  const { theta, phi, radius } = map3dSpherical;
  map3dCamera.position.set(
    radius * Math.sin(phi) * Math.sin(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.cos(theta)
  );
  map3dCamera.lookAt(0, 0, 0);
}

function updateMap3D(kfIndex) {
  if (!map3dCurrentMarker || !cameraPathData) return;
  
  const kf = cameraPathData.keyframes[kfIndex];
  const origin = cameraPathData.keyframes[0].position;
  const scale = 2;
  
  map3dCurrentMarker.position.set(
    (kf.position.x - origin.x) * scale,
    -(kf.position.y - origin.y) * scale,
    -(kf.position.z - origin.z) * scale
  );
  
  renderMap3D();
}

function renderMap3D() {
  if (!map3dRenderer) return;
  map3dRenderer.render(map3dScene, map3dCamera);
}

function toggleMap3D() {
  const panel = document.getElementById('map3d-panel');
  panel.classList.toggle('visible');
  if (panel.classList.contains('visible')) {
    renderMap3D();
  }
}

// ============================================================
// 핫스팟 (다음 위치 이동 버튼)
// ============================================================
function updateHotspots(kfIndex) {
  const container = document.getElementById('hotspot-container');
  container.innerHTML = '';
  
  if (!cameraPathData) return;
  const kfs = cameraPathData.keyframes;
  
  // 이전/다음 키프레임 핫스팟 표시
  const neighbors = [];
  if (kfIndex > 0) neighbors.push({ idx: kfIndex - 1, label: '◀' });
  if (kfIndex < kfs.length - 1) neighbors.push({ idx: kfIndex + 1, label: '▶' });
  
  neighbors.forEach(({ idx, label }) => {
    const kf = kfs[idx];
    const curr = kfs[kfIndex];
    
    // 방향 벡터 계산 (현재 → 이웃)
    const dx = kf.position.x - curr.position.x;
    const dz = kf.position.z - curr.position.z;
    const angle = Math.atan2(dx, dz);
    
    // 화면 좌표 계산 (파노라마 구체 투영)
    const screenX = 50 + Math.sin(angle) * 25;
    const screenY = 50;
    
    const hotspot = document.createElement('div');
    hotspot.className = 'hotspot';
    hotspot.style.left = `${screenX}%`;
    hotspot.style.top = `${screenY}%`;
    hotspot.style.pointerEvents = 'all';
    hotspot.title = `KF ${kf.id}로 이동`;
    hotspot.addEventListener('click', () => navigateTo(idx));
    container.appendChild(hotspot);
  });
}

// ============================================================
// 마우스/터치 컨트롤 (파노라마 드래그)
// ============================================================
function setupEventListeners() {
  const canvas = document.getElementById('panorama-canvas');
  
  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    prevMouse = { x: e.clientX, y: e.clientY };
  });
  
  canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    sphericalAngles.theta -= dx * 0.005;
    sphericalAngles.phi = Math.max(0.1, Math.min(Math.PI - 0.1, sphericalAngles.phi + dy * 0.005));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCameraDirection();
  });
  
  canvas.addEventListener('mouseup', () => isDragging = false);
  canvas.addEventListener('mouseleave', () => isDragging = false);
  
  // 터치 지원
  canvas.addEventListener('touchstart', e => {
    isDragging = true;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  });
  canvas.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    sphericalAngles.theta -= dx * 0.005;
    sphericalAngles.phi = Math.max(0.1, Math.min(Math.PI - 0.1, sphericalAngles.phi + dy * 0.005));
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    updateCameraDirection();
  });
  canvas.addEventListener('touchend', () => isDragging = false);
  
  // 마우스 휠 줌
  canvas.addEventListener('wheel', e => {
    camera.fov = Math.max(30, Math.min(120, camera.fov + e.deltaY * 0.05));
    camera.updateProjectionMatrix();
  });
  
  // 키보드
  window.addEventListener('keydown', e => {
    switch(e.key) {
      case 'ArrowLeft':  navigateTo(currentKF - 1); break;
      case 'ArrowRight': navigateTo(currentKF + 1); break;
      case ' ': toggleAutoPlay(); break;
    }
  });
  
  // 리사이즈
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
}

function updateCameraDirection() {
  const { phi, theta } = sphericalAngles;
  camera.lookAt(
    Math.sin(phi) * Math.sin(theta),
    Math.cos(phi),
    Math.sin(phi) * Math.cos(theta)
  );
}

// ============================================================
// PLY 직접 파싱 (PLYLoader 폴백)
// ============================================================
function parsePLY(buffer) {
  try {
    const decoder = new TextDecoder();
    const bytes = new Uint8Array(buffer);
    // 헤더 파싱
    let headerEnd = 0;
    for (let i = 0; i < bytes.length - 10; i++) {
      if (decoder.decode(bytes.slice(i, i + 10)).startsWith('end_header')) {
        headerEnd = i + 10;
        // 줄바꿈 건너뜀
        while (headerEnd < bytes.length && (bytes[headerEnd] === 10 || bytes[headerEnd] === 13)) headerEnd++;
        break;
      }
    }
    const header = decoder.decode(bytes.slice(0, headerEnd));
    const lines = header.split('\n').map(l => l.trim());
    const isBinary = header.includes('binary_little_endian');
    const nVertex = parseInt((lines.find(l => l.startsWith('element vertex')) || '').split(' ')[2] || '0');
    const nFace = parseInt((lines.find(l => l.startsWith('element face')) || '').split(' ')[2] || '0');
    const props = [];
    let inVertex = false;
    for (const l of lines) {
      if (l.startsWith('element vertex')) { inVertex = true; continue; }
      if (l.startsWith('element face')) { inVertex = false; continue; }
      if (inVertex && l.startsWith('property')) {
        const p = l.split(' ');
        props.push({ type: p[1], name: p[2] });
      }
    }
    const typeSize = { float: 4, float32: 4, double: 8, float64: 8, uchar: 1, uint8: 1, int: 4, int32: 4, short: 2, int16: 2 };
    const vertexSize = props.reduce((s, p) => s + (typeSize[p.type] || 4), 0);
    
    const positions = [], colors = [], indices = [];
    const view = new DataView(buffer);
    let offset = headerEnd;
    
    for (let i = 0; i < nVertex; i++) {
      let vOffset = offset;
      const row = {};
      for (const p of props) {
        const sz = typeSize[p.type] || 4;
        if (p.type === 'float' || p.type === 'float32') row[p.name] = view.getFloat32(vOffset, true);
        else if (p.type === 'double' || p.type === 'float64') row[p.name] = view.getFloat64(vOffset, true);
        else if (p.type === 'uchar' || p.type === 'uint8') row[p.name] = view.getUint8(vOffset);
        else if (p.type === 'int' || p.type === 'int32') row[p.name] = view.getInt32(vOffset, true);
        vOffset += sz;
      }
      offset += vertexSize;
      positions.push(row.x || 0, row.y || 0, row.z || 0);
      colors.push((row.red || row.diffuse_red || 128) / 255,
                  (row.green || row.diffuse_green || 128) / 255,
                  (row.blue || row.diffuse_blue || 128) / 255);
    }
    
    for (let i = 0; i < nFace; i++) {
      const n = view.getUint8(offset); offset++;
      const face = [];
      for (let j = 0; j < n; j++) { face.push(view.getInt32(offset, true)); offset += 4; }
      if (n === 3) { indices.push(...face); }
      else if (n === 4) { indices.push(face[0], face[1], face[2], face[0], face[2], face[3]); }
    }
    
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    if (colors.length > 0) geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    if (indices.length > 0) geometry.setIndex(indices);
    console.log(`[INFO] PLY 파싱: ${nVertex} 정점, ${nFace} 면`);
    return geometry;
  } catch(e) {
    console.error('[ERROR] PLY 파싱 실패:', e);
    return null;
  }
}

// ============================================================
// 렌더 루프
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
  
  // 3D 맵이 열려있으면 계속 렌더
  if (document.getElementById('map3d-panel').classList.contains('visible')) {
    renderMap3D();
  }
}

function setLoadingMsg(msg) {
  document.getElementById('loading-msg').textContent = msg;
}

// ============================================================
// 시작
// ============================================================
init().catch(console.error);
</script>
